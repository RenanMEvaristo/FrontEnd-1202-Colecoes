<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capivarias Babilônicas</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            transition: background-image 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }


        #capy {
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.3));
        }
    </style>
</head>

<body class="min-h-screen flex flex-col overflow-hidden">




    <div class="form-control bg-black/20 p-2 rounded-xl backdrop-blur-sm">
        <label class="label cursor-pointer gap-2">
            <span class="label-text font-bold text-white">Noite</span>
            <input type="checkbox" class="toggle toggle-secondary" id="manualToggle" onclick="alternarManual()" />
        </label>
    </div>
    </div>


    <div class="flex-1 flex flex-col items-center justify-center px-4 mb-20">
        <img id="capy" src="babilonico.png" alt="Capivara" class="w-full max-w-md transition-all duration-300" />


        <div class="mt-12 flex justify-center w-full">
            <img id="btnImage" src="btn.png" alt="Botão Alimentar"
                class="w-1/3 max-w-[150px] cursor-pointer hover:scale-110 active:scale-95 transition-all"
                onclick="alimentar()" />
        </div>
    </div>


    <button
        class="fixed bottom-5 right-5 opacity-0 hover:opacity-100 hover:scale-110 transition-all duration-500 w-16 h-16 overflow-hidden rounded-full border-2 border-primary shadow-2xl z-50 cursor-help"
        onclick="document.getElementById('modal_ferlini').showModal()">
        <img src="https://i.imgur.com/rQvYIit.png" alt="Ferlini" class="w-full h-full object-cover">
    </button>


    <dialog id="modal_ferlini" class="modal">
        <div class="modal-box text-center bg-base-100 border-2 border-primary">
            <h3 class="font-bold text-2xl text-primary font-serif">O Gostosinho apareceu! ✨</h3>
            <p class="py-4 font-medium italic">"Ain que delician!"</p>
            <img src="ferlini.png" class="mx-auto rounded-lg shadow-2xl border-4 border-white" alt="Ferlini Grande">
            <div class="modal-action flex justify-center">
                <form method="dialog">
                    <button class="btn btn-primary px-10">Sensacional!</button>
                </form>
            </div>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>


    <script src="script.js"></script>
</body>

</html>
